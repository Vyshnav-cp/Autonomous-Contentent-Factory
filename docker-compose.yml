version: '3.8'

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    
    container_name: content-factory-api
    
    ports:
      - "8000:8000"
    
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - PYTHONUNBUFFERED=1
      - LOG_LEVEL=info
    
    volumes:
      - ./backend:/app
      - ./outputs:/app/outputs
    
    restart: unless-stopped
    
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
    
    # Uncomment for development with auto-reload
    # command: uvicorn api:app --host 0.0.0.0 --port 8000 --reload

networks:
  default:
    name: content-factory-network
